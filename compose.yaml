name: langcall

services:
  postgres:
    image: postgres:16
    container_name: langcall-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: langcall-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: langcall-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "${ADMINER_PORT}:8080"

  mailpit:
    image: axllent/mailpit:latest
    container_name: langcall-mailpit
    restart: unless-stopped
    ports:
      - "${SMTP_PORT}:1025"
      - "${MAILPIT_WEB_PORT}:8025"

  api:
    image: jyiheng/langcall:latest
    build: .
    container_name: langcall-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  task_worker:
    image: jyiheng/langcall:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    container_name: langcall-task-worker
    restart: unless-stopped
    env_file:
      - .env
    command: python -m app.workers.task_worker

  report_scheduler:
    image: jyiheng/langcall:latest
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    container_name: langcall-report-scheduler
    restart: unless-stopped
    env_file:
      - .env
    command: python -m app.workers.report_scheduler

volumes:
  postgres_data:
  redis_data:
